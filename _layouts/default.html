<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Karla:wght@300;400;500&family=Fira+Code:wght@400&display=swap" rel="stylesheet">

  <!-- MathJax Configuration -->
  <script>
    MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true,
        tags: 'ams'
      },
      svg: {
        fontCache: 'global'
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

  <style>
    :root {
      --bg: #fdfcf9;
      --text: #1a1a1a;
      --text-secondary: #666;
      --accent: #8b4513;
      --accent-hover: #a0522d;
      --rule: #d8d3c8;
      --code-bg: #f4f1eb;
      --heading: 'Cormorant Garamond', 'Georgia', serif;
      --body: 'Karla', 'Helvetica Neue', sans-serif;
      --mono: 'Fira Code', monospace;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--body);
      font-weight: 300;
      background: var(--bg);
      color: var(--text);
      line-height: 1.75;
      font-size: 16.5px;
      -webkit-font-smoothing: antialiased;
    }

    /* --- HEADER --- */
    header {
      max-width: 680px;
      margin: 0 auto;
      padding: 2.5rem 2rem 0;
    }

    header .site-title {
      font-family: var(--heading);
      font-size: 2rem;
      font-weight: 600;
      font-style: italic;
      letter-spacing: 0.01em;
    }

    header .site-title a {
      color: var(--text);
      text-decoration: none;
    }

    header nav {
      margin-top: 0.4rem;
      display: flex;
      align-items: center;
      gap: 1.25rem;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    header nav a {
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.2s;
    }

    header nav a:hover { color: var(--accent); }

    header nav .sep {
      color: var(--rule);
      user-select: none;
    }

    /* --- HR under header --- */
    .header-rule {
      max-width: 680px;
      margin: 1.5rem auto 0;
      padding: 0 2rem;
    }

    .header-rule hr {
      border: none;
      border-top: 1px solid var(--rule);
    }

    /* --- MAIN --- */
    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 2rem 2rem 4rem;
    }

    /* --- FOOTER --- */
    footer {
      max-width: 680px;
      margin: 0 auto;
      padding: 2rem 2rem 3rem;
      font-size: 0.8rem;
      color: var(--text-secondary);
      border-top: 1px solid var(--rule);
      text-align: center;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    /* --- POST LIST (index) --- */
    .post-list {
      list-style: none;
    }

    .post-list li {
      margin-bottom: 2rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--rule);
    }

    .post-list li:last-child {
      border-bottom: none;
    }

    .post-date {
      font-size: 0.82rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .post-link {
      display: block;
      font-family: var(--heading);
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      margin-top: 0.2rem;
      line-height: 1.3;
      transition: color 0.2s;
    }

    .post-link:hover { color: var(--accent); }

    .post-excerpt {
      margin-top: 0.5rem;
      font-size: 0.95rem;
      color: var(--text-secondary);
    }

    /* --- POST CONTENT --- */
    .post-header {
      margin-bottom: 2rem;
    }

    .post-header h1 {
      font-family: var(--heading);
      font-size: 2.2rem;
      font-weight: 600;
      line-height: 1.2;
      margin-bottom: 0.4rem;
    }

    .post-header .post-meta {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .post-content h2 {
      font-family: var(--heading);
      font-size: 1.5rem;
      font-weight: 600;
      margin: 2.5rem 0 1rem;
    }

    .post-content h3 {
      font-family: var(--heading);
      font-size: 1.2rem;
      font-weight: 600;
      margin: 2rem 0 0.75rem;
    }

    .post-content p {
      margin-bottom: 1.15rem;
    }

    .post-content a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }

    .post-content a:hover {
      border-bottom-color: var(--accent);
    }

    .post-content blockquote {
      border-left: 3px solid var(--rule);
      padding-left: 1.25rem;
      margin: 1.5rem 0;
      color: var(--text-secondary);
      font-style: italic;
    }

    .post-content code {
      font-family: var(--mono);
      font-size: 0.88em;
      background: var(--code-bg);
      padding: 0.15em 0.4em;
      border-radius: 3px;
    }

    .post-content pre {
      background: var(--code-bg);
      padding: 1.25rem 1.5rem;
      border-radius: 5px;
      overflow-x: auto;
      margin: 1.5rem 0;
      line-height: 1.5;
    }

    .post-content pre code {
      padding: 0;
      background: none;
    }

    .post-content ul, .post-content ol {
      margin: 1rem 0 1.15rem 1.5rem;
    }

    .post-content li {
      margin-bottom: 0.35rem;
    }

    /* MathJax display math spacing */
    .MathJax_Display, mjx-container[display="true"] {
      margin: 1.5rem 0 !important;
    }

    /* --- BACK LINK --- */
    .back-link {
      display: inline-block;
      margin-top: 3rem;
      font-size: 0.88rem;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--accent); }

    /* --- RESPONSIVE --- */
    @media (max-width: 600px) {
      .post-header h1 { font-size: 1.75rem; }
      header .site-title { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

  <header>
    <div class="site-title"><a href="{{ site.baseurl }}/">Dots &amp; Loops</a></div>
    <nav>
      <a href="{{ site.baseurl }}/">Posts</a>
      <span class="sep">/</span>
      <a href="{{ site.professional_site }}">About me</a>
    </nav>
  </header>

  <div class="header-rule"><hr></div>

  <main>
    {{ content }}
  </main>

  <footer>
    <a href="{{ site.baseurl }}/">Dots &amp; Loops</a> &middot;
    <a href="{{ site.professional_site }}">Ben Slater</a>
  </footer>

</body>
</html>
